{% extends 'layout.html' %}
{% block title %}마이페이지 - 도(道)서관{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h4 class="fw-bold mb-4">마이페이지</h4>

        <!-- 정보 수정 -->
        <div class="card shadow-sm border-0 rounded-4 mb-4">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3">내 정보 수정</h5>
                <form method="POST">
                    <input type="hidden" name="action" value="update">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">아이디</label>
                        <input type="text" class="form-control" value="{{ member.uid }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">이름</label>
                        <input type="text" name="name" class="form-control" value="{{ member.name }}" placeholder="변경할 이름">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">새 비밀번호</label>
                        <input type="password" name="pw" class="form-control" placeholder="변경 시에만 입력">
                    </div>
                    <button type="submit" class="btn btn-teal fw-bold px-4">수정 저장</button>
                </form>
            </div>
        </div>

        <!-- 계정 비활성화 -->
        <div class="card border-danger border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h6 class="fw-bold text-danger mb-2">계정 비활성화</h6>
                <p class="text-muted small mb-3">비활성화 시 로그인이 불가능하며 관리자에게 문의해야 복구할 수 있습니다.</p>
                <form method="POST" onsubmit="return confirm('정말 계정을 비활성화하시겠습니까?')">
                    <input type="hidden" name="action" value="deactivate">
                    <button type="submit" class="btn btn-outline-danger btn-sm fw-semibold">계정 비활성화</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
