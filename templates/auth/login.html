{% extends 'layout.html' %}
{% block title %}로그인 - 도(道)서관{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-body p-5">
                <h4 class="fw-bold mb-4 text-center">로그인</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">아이디</label>
                        <input type="text" name="uid" class="form-control" placeholder="아이디를 입력하세요" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">비밀번호</label>
                        <input type="password" name="pw" class="form-control" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <button type="submit" class="btn btn-teal w-100 py-2 fw-bold">로그인</button>
                </form>
                <hr class="my-4">
                <p class="text-center text-muted mb-0">
                    계정이 없으신가요? <a href="/join" class="text-decoration-none fw-semibold" style="color: var(--primary-teal);">회원가입</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
